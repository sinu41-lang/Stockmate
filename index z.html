<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<style>

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef}=React;
const h=React.createElement;

// ── ROLES ─────────────────────────────────────────────────────────────────
const ROLES={
  '1989':{name:'X',role:'sinu'},
  '1234':{name:'Y',role:'natru'},
  'subeesh':{name:'Z',role:'subeesh'},
};
const SINU_EMAIL='x@gmail.com';

// ── PRODUCTS ──────────────────────────────────────────────────────────────
const PRODUCTS=[
  {id:'HB',  name:'HB',               sheetPcs:2,cartonPcs:12},
  {id:'PP',  name:'Piper',            sheetPcs:3,cartonPcs:12},
  {id:'KSB', name:'KR Sticker Blue',  sheetPcs:2,cartonPcs:12},
  {id:'KSR', name:'KR Sticker Red',   sheetPcs:2,cartonPcs:12},
  {id:'KIB', name:'KR Inner Blue',    sheetPcs:1,cartonPcs:12},
  {id:'KIR', name:'KR Inner Red',     sheetPcs:1,cartonPcs:12},
  {id:'HC',  name:'High Commissioner',sheetPcs:2,cartonPcs:12},
  {id:'KAL', name:'Kalinska',         sheetPcs:2,cartonPcs:12},
  {id:'GUN', name:'Major Gun',        sheetPcs:2,cartonPcs:12},
];
const PROD_MAP=Object.fromEntries(PRODUCTS.map(p=>[p.id,p]));
const UNITS=['pcs','sheet','carton'];

// ── STORAGE ───────────────────────────────────────────────────────────────
let _db=null;
function openDB(){
  if(_db)return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const r=indexedDB.open('sm3',1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore('kv');
    r.onsuccess=e=>{_db=e.target.result;res(_db)};
    r.onerror=()=>rej(r.error);
  });
}
async function dbGet(k){
  try{
    const db=await openDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction('kv','readonly');
      const rq=tx.objectStore('kv').get(k);
      rq.onsuccess=()=>res(rq.result??null);
      rq.onerror=()=>rej(rq.error);
    });
  }catch{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
}
async function dbSet(k,v){
  try{
    const db=await openDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction('kv','readwrite');
      tx.objectStore('kv').put(v,k);
      tx.oncomplete=res;tx.onerror=()=>rej(tx.error);
    });
  }catch{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
}
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// ── HELPERS ───────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36);
const fmt=n=>Number(n||0).toFixed(2);
const today=()=>new Date().toISOString().slice(0,10);
const nowISO=()=>new Date().toISOString();

function toPcs(qty,unit,prodId){
  const p=PROD_MAP[prodId];if(!p)return Number(qty);
  const q=Number(qty)||0;
  if(unit==='pcs')return q;
  if(unit==='sheet')return q*p.sheetPcs;
  if(unit==='carton')return q*p.cartonPcs;
  return q;
}
function toCartons(pcs,prodId){
  const p=PROD_MAP[prodId];if(!p)return pcs;
  return pcs/p.cartonPcs;
}
function dispC(pcs,prodId){
  const c=toCartons(pcs,prodId);
  return(Number.isInteger(c)?c:c.toFixed(2))+'ctn';
}
const LOW=12;

// ── COLORS ────────────────────────────────────────────────────────────────
const C={
  bg:'#0a0a0f',bg2:'#0f172a',bg3:'#111827',
  border:'#1e293b',border2:'#1f2937',
  green:'#4ade80',red:'#f87171',orange:'#fb923c',
  blue:'#60a5fa',purple:'#a78bfa',yellow:'#fbbf24',cyan:'#67e8f9',
  muted:'#6b7280',muted2:'#4b5563',muted3:'#374151',
};
const S={
  page:{padding:12,display:'flex',flexDirection:'column',gap:10,paddingBottom:80},
  card:{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:16,padding:14},
  cardT:{fontSize:13,fontWeight:700,color:C.blue,marginBottom:10},
  grid2:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8},
  row:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:`1px solid ${C.bg3}`},
  row2:{display:'flex',gap:8,marginBottom:8},
  lbl:{fontSize:12,color:C.muted,fontWeight:600,display:'block',marginBottom:4},
  inp:{width:'100%',background:'#1e293b',border:`1px solid ${C.border}`,borderRadius:10,padding:'10px 12px',color:'#f1f5f9',outline:'none',WebkitAppearance:'none'},
  sel:{width:'100%',background:'#1e293b',border:`1px solid ${C.border}`,borderRadius:10,padding:'10px 12px',color:'#f1f5f9',outline:'none',WebkitAppearance:'none'},
  btn:{border:'none',borderRadius:12,padding:'13px 14px',fontWeight:700,cursor:'pointer',width:'100%',marginTop:4},
  btnSm:{border:'none',borderRadius:10,padding:'9px 12px',fontWeight:600,cursor:'pointer',flex:1},
  iconBtn:{border:'none',borderRadius:8,padding:'7px 10px',fontSize:14,cursor:'pointer',minWidth:34,minHeight:34,display:'flex',alignItems:'center',justifyContent:'center'},
  badge:{fontSize:11,fontWeight:700,borderRadius:8,padding:'3px 8px'},
  empty:{color:C.muted3,fontSize:13,textAlign:'center',padding:'14px 0'},
  kpi:{background:C.bg2,border:'1px solid',borderRadius:14,padding:'12px 10px',display:'flex',flexDirection:'column',gap:3},
};

function Inp({label,value,onChange,type='text',placeholder='',half,disabled}){
  return h('div',{style:{marginBottom:8,flex:half?1:undefined}},
    label&&h('label',{style:S.lbl},label),
    h('input',{type,value,onChange:e=>onChange&&onChange(e.target.value),placeholder,disabled,
      inputMode:type==='number'?'decimal':'text',style:{...S.inp,opacity:disabled?0.5:1},
      autoComplete:'off',autoCorrect:'off',autoCapitalize:'none'})
  );
}
function Sel({label,value,onChange,options,half,disabled}){
  return h('div',{style:{marginBottom:8,flex:half?1:undefined}},
    label&&h('label',{style:S.lbl},label),
    h('select',{value,onChange:e=>onChange&&onChange(e.target.value),disabled,style:{...S.sel,opacity:disabled?0.5:1}},
      options.map(o=>h('option',{key:o.v||o,value:o.v||o},o.l||o))
    )
  );
}
function KpiCard({label,value,color,icon}){
  return h('div',{style:{...S.kpi,borderColor:color}},
    h('span',{style:{fontSize:18}},icon),
    h('span',{style:{fontSize:16,fontWeight:800,color}},value),
    h('span',{style:{fontSize:10,color:C.muted,lineHeight:1.2}},label)
  );
}
function SumRow({label,val,color='#f1f5f9'}){
  return h('div',{style:{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:`1px solid ${C.bg3}`}},
    h('span',{style:{color:C.muted,fontSize:13}},label),
    h('span',{style:{color,fontWeight:700,fontSize:13}},val)
  );
}

// ══ LOGIN SCREEN ═════════════════════════════════════════════════════════
function LoginScreen({onLogin}){
  const [pass,setPass]=useState('');
  const [err,setErr]=useState(false);
  const [showZ,setShowZ]=useState(false);

  const tryLogin=()=>{
    const r=ROLES[pass];
    if(r){onLogin(r);setErr(false)}
    else{setErr(true);setPass('')}
  };

  return h('div',{style:{height:'100dvh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:C.bg,padding:24}},
    h('div',{style:{fontSize:48,marginBottom:8}},'📦'),
    h('div',{style:{fontSize:24,fontWeight:800,marginBottom:4}},'StockMate Pro'),
    h('div',{style:{fontSize:13,color:C.muted,marginBottom:32}},'Inventory Management'),
    h('div',{style:{width:'100%',maxWidth:320}},
      h('label',{style:S.lbl},'Enter Your Password'),
      h('input',{type:'password',value:pass,onChange:e=>setPass(e.target.value),
        placeholder:'Password',style:{...S.inp,marginBottom:8,textAlign:'center',fontSize:'20px!important'},
        onKeyDown:e=>e.key==='Enter'&&tryLogin(),autoComplete:'off'}),
      err&&h('div',{style:{color:C.red,fontSize:12,textAlign:'center',marginBottom:8}},'❌ Wrong password'),
      h('button',{onClick:tryLogin,style:{...S.btn,background:'#1d4ed8',color:C.blue,marginTop:4}},'Login'),
      h('div',{style:{textAlign:'center',marginTop:16}},
        h('button',{onClick:()=>setShowZ(true),style:{background:'none',border:`1px solid ${C.border}`,borderRadius:10,padding:'8px 16px',color:C.muted,cursor:'pointer',fontSize:13}},'👁 View as Z')
      )
    )
  );
}

// ══ SUBEESH VIEW ═════════════════════════════════════════════════════════
function ZView({stockMap,productPhotos,onLogout}){
  const lowItems=PRODUCTS.filter(p=>stockMap[p.id].totalPcs<LOW&&stockMap[p.id].totalPcs>=0);
  return h('div',{style:{height:'100dvh',display:'flex',flexDirection:'column',background:C.bg}},
    h('div',{style:{background:C.bg2,padding:`calc(env(safe-area-inset-top)+12px) 16px 10px`,display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:`1px solid ${C.border}`,flexShrink:0}},
      h('span',{style:{fontWeight:800,fontSize:16}},'📦 Stock View — Z'),
      h('button',{onClick:onLogout,style:{...S.iconBtn,background:C.muted3,color:'#fff',fontSize:12}},'Exit')
    ),
    h('div',{style:{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:12,display:'flex',flexDirection:'column',gap:10}},
      lowItems.length>0&&h('div',{style:{...S.card,borderColor:'#dc2626'}},
        h('div',{style:{...S.cardT,color:C.red}},'⚠️ Low Stock Alert'),
        lowItems.map(p=>h('div',{key:p.id,style:S.row},
          h('span',{style:{fontSize:13,fontWeight:600}},p.name),
          h('span',{style:{...S.badge,background:'#7f1d1d',color:'#fca5a5'}},`${dispC(stockMap[p.id].totalPcs,p.id)} left`)
        ))
      ),
      h('div',{style:S.card},
        h('div',{style:S.cardT},'📋 Stock Report'),
        PRODUCTS.map(p=>{
          const m=stockMap[p.id];
          const ctns=toCartons(m.totalPcs,p.id);
          const low=m.totalPcs<LOW;
          const lastCost=m.layers.length?Math.max(...m.layers.map(l=>l.cpp))*PROD_MAP[p.id].cartonPcs:0;
          return h('div',{key:p.id,style:{...S.card,background:C.bg3,marginBottom:8,borderColor:low?'#dc2626':C.border2}},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
              h('div',{style:{display:'flex',alignItems:'center',gap:8}},
                productPhotos[p.id]&&h('img',{src:productPhotos[p.id],style:{width:36,height:36,borderRadius:8,objectFit:'cover'}}),
                h('div',null,
                  h('div',{style:{fontWeight:700,fontSize:14}},p.name),
                  h('div',{style:{fontSize:11,color:C.muted}},`${p.id}`)
                )
              ),
              h('div',{style:{textAlign:'right'}},
                h('div',{style:{...S.badge,background:low?'#7f1d1d':'#166534',color:low?'#fca5a5':C.green}},
                  `${ctns%1===0?ctns:ctns.toFixed(2)} ctn`
                ),
                h('div',{style:{fontSize:11,color:C.orange,marginTop:4}},`Cost: ﷼${fmt(lastCost)}/ctn`)
              )
            )
          );
        })
      )
    )
  );
}

// ══ NATRU VIEW ═══════════════════════════════════════════════════════════
function YView({stockMap,productPhotos,pendingSales,setPendingSales,approvedSales,onLogout}){
  const [items,setItems]=useState([{id:uid(),prodId:'HB',qty:'',unit:'carton',salePrice:''}]);
  const [custName,setCustName]=useState('');
  const [date,setDate]=useState(today());
  const [submitted,setSubmitted]=useState(false);
  const [tab,setTab]=useState('sale');

  const addItem=()=>setItems(p=>[...p,{id:uid(),prodId:'HB',qty:'',unit:'carton',salePrice:''}]);
  const updItem=(id,f,v)=>setItems(p=>p.map(i=>i.id===id?{...i,[f]:v}:i));

  const submitSale=()=>{
    if(!custName.trim())return alert('Enter customer name');
    if(items.some(i=>!i.qty||!i.salePrice))return alert('Fill all items');
    const saleItems=items.map(i=>{
      const pcs=toPcs(i.qty,i.unit,i.prodId);
      const ctns=pcs/PROD_MAP[i.prodId].cartonPcs;
      const saleTotal=ctns*Number(i.salePrice);
      return{...i,pcs,ctns,saleTotal};
    });
    const totalSale=saleItems.reduce((a,i)=>a+i.saleTotal,0);
    const newSale={id:uid(),custName:custName.trim(),items:saleItems,date,totalSale,
      status:'pending',submittedAt:nowISO(),submittedBy:'Y'};
    setPendingSales(p=>[...p,newSale]);
    setSubmitted(true);
    setItems([{id:uid(),prodId:'HB',qty:'',unit:'carton',salePrice:''}]);
    setCustName('');
  };

  const myApproved=approvedSales.filter(s=>s.submittedBy==='Y');
  const myPending=pendingSales.filter(s=>s.submittedBy==='Y'&&s.status==='pending');
  const totalProfit=myApproved.reduce((a,s)=>a+Number(s.profit||0),0);

  return h('div',{style:{height:'100dvh',display:'flex',flexDirection:'column',background:C.bg}},
    h('div',{style:{background:C.bg2,padding:`calc(env(safe-area-inset-top)+12px) 16px 10px`,display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:`1px solid ${C.border}`,flexShrink:0}},
      h('span',{style:{fontWeight:800,fontSize:16}},'👤 Y'),
      h('button',{onClick:onLogout,style:{...S.iconBtn,background:C.muted3,color:'#fff',fontSize:12}},'Exit')
    ),
    h('nav',{style:{flexShrink:0,background:'#0f172a',borderBottom:`1px solid ${C.border}`,display:'flex'}},
      [{id:'sale',label:'💰 New Sale'},{id:'pending',label:`⏳ Pending (${myPending.length})`},{id:'approved',label:'✅ Approved'}].map(t=>
        h('button',{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:'10px 4px',background:'none',border:'none',cursor:'pointer',color:tab===t.id?C.blue:C.muted,fontWeight:tab===t.id?700:400,fontSize:12,borderBottom:tab===t.id?`2px solid ${C.blue}`:'2px solid transparent'}},t.label)
      )
    ),
    h('div',{style:{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:12,display:'flex',flexDirection:'column',gap:10,paddingBottom:16}},
      // Stock overview for Y (no cost price)
      tab==='sale'&&h('div',null,
        submitted&&h('div',{style:{...S.card,borderColor:C.green,marginBottom:10}},
          h('div',{style:{...S.cardT,color:C.green}},'✅ Sale Submitted!'),
          h('div',{style:{fontSize:13,color:C.muted}},'Waiting for X approval. You will see result once approved.'),
          h('button',{onClick:()=>setSubmitted(false),style:{...S.btn,background:'#166534',color:C.green,marginTop:8}},'New Sale')
        ),
        !submitted&&h('div',null,
          h('div',{style:S.card},
            h('div',{style:S.cardT},'📦 Available Stock'),
            PRODUCTS.map(p=>{
              const m=stockMap[p.id];
              const ctns=toCartons(m.totalPcs,p.id);
              return h('div',{key:p.id,style:S.row},
                h('span',{style:{fontSize:13,fontWeight:600}},p.name),
                h('span',{style:{...S.badge,background:m.totalPcs<LOW?'#7f1d1d':'#166534',color:m.totalPcs<LOW?'#fca5a5':C.green}},
                  `${ctns%1===0?ctns:ctns.toFixed(2)} ctn`)
              );
            })
          ),
          h('div',{style:S.card},
            h('div',{style:S.cardT},'💰 New Sale Request'),
            h(Inp,{label:'Customer Name',value:custName,onChange:setCustName,placeholder:'Customer name'}),
            h('label',{style:S.lbl},'Date'),
            h('input',{type:'date',value:date,onChange:e=>setDate(e.target.value),style:{...S.inp,marginBottom:8}}),
            items.map((item,idx)=>h('div',{key:item.id,style:{...S.card,background:C.bg3,marginBottom:6}},
              h('div',{style:{fontSize:12,fontWeight:700,color:C.orange,marginBottom:6}},`Item ${idx+1}`),
              h(Sel,{label:'Product',value:item.prodId,onChange:v=>updItem(item.id,'prodId',v),
                options:PRODUCTS.map(p=>({v:p.id,l:`${p.id} – ${p.name}`}))}),
              h('div',{style:S.row2},
                h(Inp,{label:'Qty',value:item.qty,onChange:v=>updItem(item.id,'qty',v),type:'number',half:true}),
                h(Sel,{label:'Unit',value:item.unit,onChange:v=>updItem(item.id,'unit',v),options:UNITS,half:true})
              ),
              item.qty&&h('div',{style:{fontSize:11,color:C.cyan,marginBottom:6}},
                `= ${(toPcs(item.qty,item.unit,item.prodId)/PROD_MAP[item.prodId].cartonPcs).toFixed(2)} cartons`
              ),
              h(Inp,{label:'Your Sale Price per Carton (﷼)',value:item.salePrice,onChange:v=>updItem(item.id,'salePrice',v),type:'number'}),
              items.length>1&&h('button',{onClick:()=>setItems(p=>p.filter(i=>i.id!==item.id)),
                style:{...S.btn,background:'#7f1d1d',color:'#fca5a5',padding:'8px',fontSize:12}},'Remove')
            )),
            h('button',{onClick:addItem,style:{...S.btn,background:'#1e3a5f',color:C.blue,padding:'10px',marginBottom:4}},'+ Add Item'),
            h('button',{onClick:submitSale,style:{...S.btn,background:'#1d4ed8',color:C.blue}},'📤 Submit for X Approval')
          )
        )
      ),
      tab==='pending'&&h('div',null,
        myPending.length===0&&h('div',{style:{...S.card,...S.empty}},'No pending sales'),
        myPending.map(s=>h('div',{key:s.id,style:{...S.card,borderColor:C.orange}},
          h('div',{style:{...S.cardT,color:C.orange}},'⏳ Awaiting X Approval'),
          h('div',{style:{fontSize:13,fontWeight:600,marginBottom:4}},`Customer: ${s.custName}`),
          h('div',{style:{fontSize:12,color:C.muted,marginBottom:6}},`Date: ${s.date} | Total: ﷼${fmt(s.totalSale)}`),
          s.items.map((i,idx)=>h('div',{key:idx,style:{fontSize:12,color:'#9ca3af',padding:'3px 0',borderBottom:`1px solid ${C.bg3}`}},
            `${i.prodId}: ${i.ctns.toFixed(2)}ctn × ﷼${i.salePrice} = ﷼${fmt(i.saleTotal)}`
          ))
        ))
      ),
      tab==='approved'&&h('div',null,
        h('div',{style:{...S.card,borderColor:C.purple,marginBottom:10}},
          h(SumRow,{label:'Total Profit (My 50%)',val:`﷼${fmt(totalProfit/2)}`,color:C.purple}),
          h(SumRow,{label:'Total Sales',val:`﷼${fmt(myApproved.reduce((a,s)=>a+s.totalSale,0))}`,color:C.green})
        ),
        myApproved.length===0&&h('div',{style:{...S.card,...S.empty}},'No approved sales yet'),
        myApproved.map(s=>h('div',{key:s.id,style:{...S.card,borderColor:C.green,marginBottom:0}},
          h('div',{style:{...S.cardT,color:C.green}},'✅ Approved'),
          h('div',{style:{fontSize:13,fontWeight:600,marginBottom:4}},`Customer: ${s.custName} | ${s.date}`),
          s.items.map((i,idx)=>h('div',{key:idx,style:{fontSize:12,color:'#9ca3af',padding:'3px 0',borderBottom:`1px solid ${C.bg3}`}},
            `${i.prodId}: ${i.ctns.toFixed(2)}ctn × ﷼${i.salePrice} = ﷼${fmt(i.saleTotal)}`
          )),
          h('div',{style:{marginTop:6}},
            h(SumRow,{label:'Sale Total',val:`﷼${fmt(s.totalSale)}`,color:C.green}),
            h(SumRow,{label:'Gross Profit',val:`﷼${fmt(s.profit||0)}`,color:C.purple}),
            h(SumRow,{label:'Y 50%',val:`﷼${fmt((s.profit||0)/2)}`,color:C.cyan}),
            h(SumRow,{label:'X 50%',val:`﷼${fmt((s.profit||0)/2)}`,color:C.yellow})
          ),
          h('button',{onClick:()=>{
            let msg=`*StockMate Invoice*\nCustomer: ${s.custName}\nDate: ${s.date}\n─────────\n`;
            s.items.forEach(i=>{msg+=`${i.prodId}: ${i.ctns.toFixed(2)}ctn × ﷼${i.salePrice} = ﷼${fmt(i.saleTotal)}\n`});
            msg+=`─────────\nTotal: ﷼${fmt(s.totalSale)}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
          },style:{...S.btn,background:'#166534',color:C.green,marginTop:8,padding:'10px'}},'📤 Share Invoice')
        ))
      )
    )
  );
}

// ══ MAIN APP (SINU) ═══════════════════════════════════════════════════════
const SINU_TABS=[
  {id:'dash',icon:'🏠',label:'Home'},
  {id:'stock',icon:'📦',label:'Stock'},
  {id:'sales',icon:'💰',label:'Sales'},
  {id:'approve',icon:'✅',label:'Approve'},

// ── SINU DASHBOARD ────────────────────────────────────────────────────────
function XDash({stockMap,sales,supplyTx,customers,pendingSales,setTab}){
  const pending=pendingSales.filter(s=>s.status==='pending');
  const totalSales=sales.reduce((a,s)=>a+Number(s.totalSale||0),0);
  const custPending=customers.reduce((a,c)=>a+Number(c.pendingAmt||0),0);
  const suppPending=supplyTx.filter(t=>t.type==='credit').reduce((a,t)=>a+t.amount,0)-supplyTx.filter(t=>t.type==='payment').reduce((a,t)=>a+t.amount,0);
  const lowItems=PRODUCTS.filter(p=>stockMap[p.id].totalPcs<LOW);
  return h('div',{style:S.page},
    h('div',{style:S.grid2},
      h(KpiCard,{label:'Total Sales',value:`﷼${fmt(totalSales)}`,color:C.green,icon:'💰'}),
      h(KpiCard,{label:'Pending Approvals',value:pending.length,color:pending.length>0?C.red:C.muted,icon:'⏳'}),
      h(KpiCard,{label:'Cust. Pending',value:`﷼${fmt(custPending)}`,color:C.orange,icon:'👤'}),
      h(KpiCard,{label:'Supplier Due',value:`﷼${fmt(suppPending)}`,color:C.red,icon:'🚚'})
    ),
    pending.length>0&&h('div',{style:{...S.card,borderColor:'#dc2626',cursor:'pointer'},onClick:()=>setTab('approve')},
      h('div',{style:{...S.cardT,color:C.red}},`🔔 ${pending.length} Sale(s) Waiting Approval`),
      pending.map(s=>h('div',{key:s.id,style:S.row},
        h('span',{style:{fontSize:13}},`${s.custName} — ﷼${fmt(s.totalSale)}`),
        h('span',{style:{...S.badge,background:'#dc2626'}},'Pending')
      ))
    ),
    lowItems.length>0&&h('div',{style:{...S.card,borderColor:'#dc2626'}},
      h('div',{style:{...S.cardT,color:C.red}},'⚠️ Low Stock'),
      lowItems.map(p=>h('div',{key:p.id,style:S.row},
        h('span',{style:{fontSize:13}},p.name),
        h('span',{style:{...S.badge,background:'#7f1d1d',color:'#fca5a5'}},dispC(stockMap[p.id].totalPcs,p.id))
      ))
    ),
    h('div',{style:S.card},
      h('div',{style:S.cardT},'📦 Stock Overview'),
      PRODUCTS.map(p=>{
        const m=stockMap[p.id];
        const ctns=toCartons(m.totalPcs,p.id);
        const low=m.totalPcs<LOW;
        const lastCost=m.layers.length?Math.max(...m.layers.map(l=>l.cpp))*PROD_MAP[p.id].cartonPcs:0;
        return h('div',{key:p.id,style:S.row},
          h('div',{style:{display:'flex',alignItems:'center',gap:6}},
            m.photo&&h('img',{src:m.photo,style:{width:24,height:24,borderRadius:4,objectFit:'cover'}}),
            h('span',{style:{fontSize:13,fontWeight:600}},p.id)
          ),
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{...S.badge,background:low?'#7f1d1d':'#166534',color:low?'#fca5a5':C.green}},`${ctns%1===0?ctns:ctns.toFixed(2)}ctn`),
            lastCost>0&&h('div',{style:{fontSize:10,color:C.orange}},`﷼${fmt(lastCost)}/ctn`)
          )
        );
      })
    )
  );
}

// ── STOCK PAGE ────────────────────────────────────────────────────────────
function StockPage({stockEntries,setStockEntries,productPhotos,setProductPhotos,stockMap}){
  const [prodId,setProdId]=useState('HB');
  const [qty,setQty]=useState('');
  const [unit,setUnit]=useState('carton');
  const [cost,setCost]=useState('');
  const [suppName,setSuppName]=useState('');
  const [date,setDate]=useState(today());

  const add=()=>{
    if(!qty||!cost)return alert('Enter qty and cost');
    const pcs=toPcs(qty,unit,prodId);
    setStockEntries(p=>[...p,{id:uid(),prodId,qty:Number(qty),unit,pcs,costPerCarton:Number(cost),suppName,date}]);
    setQty('');setCost('');setSuppName('');
  };

  // Share stock availability
  const shareStock=()=>{
    let msg='*StockMate — Stock Availability*\n';
    msg+=`Date: ${today()}\n─────────────────\n`;
    PRODUCTS.forEach(p=>{
      const m=stockMap[p.id];
      const ctns=toCartons(m.totalPcs,p.id);
      const lastCost=m.layers.length?Math.max(...m.layers.map(l=>l.cpp))*PROD_MAP[p.id].cartonPcs:0;
      msg+=`${p.name}: ${ctns%1===0?ctns:ctns.toFixed(2)} ctn`;
      if(lastCost>0)msg+=` @ ﷼${fmt(lastCost)}/ctn`;
      msg+='\n';
    });
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
  };

  return h('div',{style:S.page},
    h('button',{onClick:shareStock,style:{...S.btn,background:'#166534',color:C.green}},'📤 Share Stock List via WhatsApp'),
    h('div',{style:S.card},
      h('div',{style:S.cardT},'📥 Add Stock'),
      h(Sel,{label:'Product',value:prodId,onChange:setProdId,options:PRODUCTS.map(p=>({v:p.id,l:`${p.id} – ${p.name}`}))}),
      h('div',{style:S.row2},
        h(Inp,{label:'Qty',value:qty,onChange:setQty,type:'number',half:true}),
        h(Sel,{label:'Unit',value:unit,onChange:setUnit,options:UNITS,half:true})
      ),
      prodId&&qty&&h('div',{style:{fontSize:11,color:C.cyan,marginBottom:6}},
        `= ${(toPcs(qty,unit,prodId)/PROD_MAP[prodId].cartonPcs).toFixed(2)} cartons`
      ),
      h(Inp,{label:'Cost per Carton (﷼)',value:cost,onChange:setCost,type:'number'}),
      h(Inp,{label:'Supplier (optional)',value:suppName,onChange:setSuppName}),
      h('label',{style:S.lbl},'Date'),
      h('input',{type:'date',value:date,onChange:e=>setDate(e.target.value),style:{...S.inp,marginBottom:8}}),
      h('div',{style:{marginBottom:8}},
        h('label',{style:S.lbl},'Product Photo (optional)'),
        h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
          productPhotos[prodId]?h('img',{src:productPhotos[prodId],style:{width:44,height:44,borderRadius:8,objectFit:'cover',border:`1px solid ${C.border}`}}):
            h('div',{style:{width:44,height:44,borderRadius:8,background:C.bg3,border:`1px dashed ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}},'📷'),
          h('label',{style:{...S.btnSm,background:'#1e3a5f',color:C.blue,textAlign:'center',padding:'10px 14px',borderRadius:10,cursor:'pointer'}},
            'Add Photo',
            h('input',{type:'file',accept:'image/*',style:{display:'none'},onChange:e=>{
              const f=e.target.files[0];if(!f)return;
              const r=new FileReader();r.onload=ev=>setProductPhotos(p=>({...p,[prodId]:ev.target.result}));
              r.readAsDataURL(f);e.target.value='';
            }})
          ),
          productPhotos[prodId]&&h('button',{onClick:()=>setProductPhotos(p=>({...p,[prodId]:''})),style:{...S.iconBtn,background:C.muted3,color:'#fff'}},'✕')
        )
      ),
      h('button',{onClick:add,style:{...S.btn,background:'#14532d',color:C.green}},'+ Add Stock')
    ),
    h('div',{style:S.card},
      h('div',{style:S.cardT},`📋 Stock Entries (${stockEntries.length})`),
      stockEntries.length===0&&h('div',{style:S.empty},'No entries'),
      [...stockEntries].reverse().map(e=>h('div',{key:e.id,style:{background:C.bg3,borderRadius:10,border:`1px solid ${C.border2}`,padding:10,marginBottom:8}},
        h('div',{style:{display:'flex',justifyContent:'space-between'}},
          h('div',null,
            productPhotos[e.prodId]&&h('img',{src:productPhotos[e.prodId],style:{width:28,height:28,borderRadius:6,objectFit:'cover',marginBottom:4}}),
            h('div',{style:{fontWeight:700,fontSize:13}},`${e.prodId} – ${PROD_MAP[e.prodId]?.name}`),
            h('div',{style:{fontSize:12,color:C.muted}},`${e.qty} ${e.unit} (${dispC(e.pcs,e.prodId)}) @ ﷼${e.costPerCarton}/ctn`),
            e.suppName&&h('div',{style:{fontSize:11,color:C.muted2}},`Supplier: ${e.suppName}`),
            h('div',{style:{fontSize:11,color:C.muted2}},`📅 ${e.date}`)
          ),
          h('button',{onClick:()=>setStockEntries(p=>p.filter(x=>x.id!==e.id)),style:{...S.iconBtn,background:'#7f1d1d',color:'#fff'}},'🗑️')
        )
      ))
    )
  );
}

// ── SINU SALES PAGE ───────────────────────────────────────────────────────
function XSalesPage({sales,setSales,customers,setCustomers,stockMap,getLastHighCost}){
  const [custName,setCustName]=useState('');
  const [selCust,setSelCust]=useState('');
  const [items,setItems]=useState([{id:uid(),prodId:'HB',qty:'',unit:'carton',salePrice:''}]);
  const [date,setDate]=useState(today());
  const [paidAmt,setPaidAmt]=useState('');
  const [showInv,setShowInv]=useState(null);
  const custList=[...new Set(customers.map(c=>c.name))];
  const addItem=()=>setItems(p=>[...p,{id:uid(),prodId:'HB',qty:'',unit:'carton',salePrice:''}]);
  const updItem=(id,f,v)=>setItems(p=>p.map(i=>i.id===id?{...i,[f]:v}:i));
  const saveSale=()=>{
    const cName=(selCust||custName).trim();
    if(!cName)return alert('Enter customer name');
    if(items.some(i=>!i.qty||!i.salePrice))return alert('Fill all items');
    const saleItems=items.map(i=>{
      const pcs=toPcs(i.qty,i.unit,i.prodId);
      const ctns=pcs/PROD_MAP[i.prodId].cartonPcs;
      const cpp=getLastHighCost(i.prodId)/PROD_MAP[i.prodId].cartonPcs;
      const costTotal=ctns*getLastHighCost(i.prodId);
      const saleTotal=ctns*Number(i.salePrice);
      return{...i,pcs,ctns,costTotal,saleTotal,grossProfit:saleTotal-costTotal};
    });
    const totalSale=saleItems.reduce((a,i)=>a+i.saleTotal,0);
    const totalProfit=saleItems.reduce((a,i)=>a+i.grossProfit,0);
    const paid=Number(paidAmt)||0;
    const pending=totalSale-paid;
    const saleId=uid();
    const newSale={id:saleId,custName:cName,items:saleItems,date,totalSale,totalProfit,paid,pending,
      sProfit:totalProfit/2,nProfit:totalProfit/2,createdAt:nowISO(),by:'sinu'};
    setSales(p=>[...p,newSale]);
    setCustomers(p=>{
      const ex=p.find(c=>c.name===cName);
      if(ex)return p.map(c=>c.name===cName?{...c,totalSales:Number(c.totalSales||0)+totalSale,pendingAmt:Number(c.pendingAmt||0)+pending}:c);
      return [...p,{id:uid(),name:cName,totalSales:totalSale,pendingAmt:pending}];
    });
    setShowInv(newSale);
    setItems([{id:uid(),prodId:'HB',qty:'',unit:'carton',salePrice:''}]);
    setPaidAmt('');setCustName('');setSelCust('');
  };
  return h('div',{style:S.page},
    showInv&&h('div',{style:{...S.card,borderColor:C.green}},
      h('div',{style:{...S.cardT,color:C.green}},'✅ Sale Saved'),
      showInv.items.map((i,idx)=>h('div',{key:idx,style:{fontSize:12,color:'#9ca3af',padding:'3px 0',borderBottom:`1px solid ${C.bg3}`}},
        `${i.prodId}: ${i.ctns.toFixed(2)}ctn × ﷼${i.salePrice} = ﷼${fmt(i.saleTotal)}`
      )),
      h('div',{style:{marginTop:6}},
        h(SumRow,{label:'Total',val:`﷼${fmt(showInv.totalSale)}`,color:C.green}),
        h(SumRow,{label:'Profit',val:`﷼${fmt(showInv.totalProfit)}`,color:C.purple}),
        h(SumRow,{label:'X 50%',val:`﷼${fmt(showInv.sProfit)}`,color:C.cyan}),
        h(SumRow,{label:'Y 50%',val:`﷼${fmt(showInv.nProfit)}`,color:C.yellow})
      ),
      h('div',{style:{display:'flex',gap:8,marginTop:8}},
        h('button',{onClick:()=>{
          let msg=`*Invoice*\nCustomer: ${showInv.custName}\nDate: ${showInv.date}\n─────────\n`;
          showInv.items.forEach(i=>{msg+=`${i.prodId}: ${i.ctns.toFixed(2)}ctn × ﷼${i.salePrice} = ﷼${fmt(i.saleTotal)}\n`});
          msg+=`─────────\nTotal: ﷼${fmt(showInv.totalSale)}`;
          if(showInv.pending>0)msg+=`\nPending: ﷼${fmt(showInv.pending)}`;
          window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
        },style:{...S.btnSm,background:'#166534',color:C.green}},'📤 WhatsApp'),
        h('button',{onClick:()=>setShowInv(null),style:{...S.btnSm,background:C.muted3,color:'#fff'}},'New Sale')
      )
    ),
    !showInv&&h('div',{style:S.card},
      h('div',{style:S.cardT},'💰 New Sale'),
      custList.length>0&&h(Sel,{label:'Select Customer',value:selCust,onChange:setSelCust,
        options:[{v:'',l:'— New Customer —'},...custList.map(c=>({v:c,l:c}))]}),
      !selCust&&h(Inp,{label:'New Customer Name',value:custName,onChange:setCustName}),
      h('label',{style:S.lbl},'Date'),
      h('input',{type:'date',value:date,onChange:e=>setDate(e.target.value),style:{...S.inp,marginBottom:8}}),
      items.map((item,idx)=>h('div',{key:item.id,style:{...S.card,background:C.bg3,marginBottom:6}},
        h('div',{style:{fontSize:12,fontWeight:700,color:C.orange,marginBottom:6}},`Item ${idx+1}`),
        h(Sel,{label:'Product',value:item.prodId,onChange:v=>updItem(item.id,'prodId',v),
          options:PRODUCTS.map(p=>({v:p.id,l:`${p.id} – ${p.name}`}))}),
        h('div',{style:S.row2},
          h(Inp,{label:'Qty',value:item.qty,onChange:v=>updItem(item.id,'qty',v),type:'number',half:true}),
          h(Sel,{label:'Unit',value:item.unit,onChange:v=>updItem(item.id,'unit',v),options:UNITS,half:true})
        ),
        item.qty&&h('div',{style:{fontSize:11,color:C.cyan,marginBottom:6}},
          `= ${(toPcs(item.qty,item.unit,item.prodId)/PROD_MAP[item.prodId].cartonPcs).toFixed(2)} cartons`
        ),
        h(Inp,{label:'Sale Price/Carton (﷼)',value:item.salePrice,onChange:v=>updItem(item.id,'salePrice',v),type:'number'}),
        items.length>1&&h('button',{onClick:()=>setItems(p=>p.filter(i=>i.id!==item.id)),
          style:{...S.btn,background:'#7f1d1d',color:'#fca5a5',padding:'8px',fontSize:12}},'Remove')
      )),
      h('button',{onClick:addItem,style:{...S.btn,background:'#1e3a5f',color:C.blue,padding:'10px',marginBottom:4}},'+ Add Item'),
      h(Inp,{label:'Amount Paid (﷼)',value:paidAmt,onChange:setPaidAmt,type:'number',placeholder:'0'}),
      h('button',{onClick:saveSale,style:{...S.btn,background:'#1d4ed8',color:C.blue}},'💾 Save Sale')
    )
  );
}

// ── APPROVE PAGE ──────────────────────────────────────────────────────────
function ApprovePage({pendingSales,setPendingSales,approvedSales,setApprovedSales,stockMap,getLastHighCost,setSales,setCustomers}){
  const pending=pendingSales.filter(s=>s.status==='pending');

  const approve=(sale)=>{
    const saleItems=sale.items.map(i=>{
      const ctns=Number(i.ctns||0);
      const costPerCtn=getLastHighCost(i.prodId);
      const costTotal=ctns*costPerCtn;
      const saleTotal=Number(i.saleTotal||0);
      const grossProfit=saleTotal-costTotal;
      return{...i,costPerCtn,costTotal,grossProfit};
    });
    const totalProfit=saleItems.reduce((a,i)=>a+i.grossProfit,0);
    const approved={...sale,items:saleItems,profit:totalProfit,status:'approved',approvedAt:nowISO()};
    setPendingSales(p=>p.map(s=>s.id===sale.id?{...s,status:'approved'}:s));
    setApprovedSales(p=>[...p,approved]);
    setSales(p=>[...p,{...approved,totalSale:sale.totalSale,totalProfit,paid:sale.totalSale,pending:0,createdAt:nowISO()}]);
    setCustomers(p=>{
      const ex=p.find(c=>c.name===sale.custName);
      if(ex)return p.map(c=>c.name===sale.custName?{...c,totalSales:Number(c.totalSales||0)+sale.totalSale}:c);
      return [...p,{id:uid(),name:sale.custName,totalSales:sale.totalSale,pendingAmt:0}];
    });
  };

  const reject=(id)=>setPendingSales(p=>p.map(s=>s.id===id?{...s,status:'rejected'}:s));

  return h('div',{style:S.page},
    pending.length===0&&h('div',{style:{...S.card,...S.empty}},'✅ No pending approvals'),
    pending.map(s=>{
      const previewItems=s.items.map(i=>{
        const ctns=Number(i.ctns||0);
        const cpp=getLastHighCost(i.prodId);
        const costTotal=ctns*cpp;
        const saleTotal=Number(i.saleTotal||0);
        return{...i,cpp,costTotal,grossProfit:saleTotal-costTotal};
      });
      const totalProfit=previewItems.reduce((a,i)=>a+i.grossProfit,0);
      return h('div',{key:s.id,style:{...S.card,borderColor:C.orange}},
        h('div',{style:{...S.cardT,color:C.orange}},'⏳ Y Sale Request'),
        h('div',{style:{fontSize:13,fontWeight:600,marginBottom:4}},`Customer: ${s.custName} | ${s.date}`),
        previewItems.map((i,idx)=>h('div',{key:idx,style:{fontSize:12,padding:'3px 0',borderBottom:`1px solid ${C.bg3}`}},
          h('span',{style:{color:'#9ca3af'}},`${i.prodId}: ${i.ctns.toFixed(2)}ctn`),
          h('span',{style:{color:C.blue}},` Sale: ﷼${fmt(i.saleTotal)}`),
          h('span',{style:{color:C.muted}},` Cost: ﷼${fmt(i.costTotal)}`),
          h('span',{style:{color:i.grossProfit>=0?C.green:C.red}},` Profit: ﷼${fmt(i.grossProfit)}`)
        )),
        h('div',{style:{marginTop:6}},
          h(SumRow,{label:'Total Sale',val:`﷼${fmt(s.totalSale)}`,color:C.green}),
          h(SumRow,{label:'Total Profit',val:`﷼${fmt(totalProfit)}`,color:C.purple}),
          h(SumRow,{label:'X 50%',val:`﷼${fmt(totalProfit/2)}`,color:C.cyan}),
          h(SumRow,{label:'Y 50%',val:`﷼${fmt(totalProfit/2)}`,color:C.yellow})
        ),
        h('div',{style:{display:'flex',gap:8,marginTop:10}},
          h('button',{onClick:()=>approve(s),style:{...S.btnSm,background:'#166534',color:C.green,fontSize:15}},'✅ Approve'),
          h('button',{onClick:()=>reject(s.id),style:{...S.btnSm,background:'#7f1d1d',color:'#fca5a5',fontSize:15}},'❌ Reject')
        )
      );
    })
  );
}

// ── SUPPLY PAGE ───────────────────────────────────────────────────────────
function SupplyPage({suppliers,setSuppliers,supplyTx,setSupplyTx}){
  const [showNew,setShowNew]=useState(false);
  const [name,setName]=useState('');
  const [showTx,setShowTx]=useState(false);
  const [txSupp,setTxSupp]=useState('');
  const [txAmt,setTxAmt]=useState('');
  const [txNote,setTxNote]=useState('');
  const [txDate,setTxDate]=useState(today());
  const [txType,setTxType]=useState('credit');
  const [view,setView]=useState(null);
  const addSupp=()=>{
    if(!name.trim())return;
    setSuppliers(p=>[...p,{id:uid(),name:name.trim()}]);
    setName('');setShowNew(false);
  };
  const addTx=()=>{
    if(!txSupp||!txAmt)return alert('Fill all fields');
    setSupplyTx(p=>[...p,{id:uid(),suppName:txSupp,amount:Number(txAmt),type:txType,note:txNote,date:txDate}]);
    setTxAmt('');setTxNote('');setShowTx(false);
  };
  return h('div',{style:S.page},
    h('div',{style:{display:'flex',gap:8}},
      h('button',{onClick:()=>setShowNew(s=>!s),style:{...S.btn,background:'#1e3a5f',color:C.blue,flex:1,marginTop:0}},showNew?'✕ Cancel':'+ Supplier'),
      h('button',{onClick:()=>setShowTx(s=>!s),style:{...S.btn,background:'#78350f',color:C.orange,flex:1,marginTop:0}},showTx?'✕ Cancel':'+ Transaction')
    ),
    showNew&&h('div',{style:S.card},
      h(Inp,{label:'Supplier Name',value:name,onChange:setName}),
      h('button',{onClick:addSupp,style:{...S.btn,background:'#1e3a5f',color:C.blue}},'Save')
    ),
    showTx&&h('div',{style:S.card},
      h(Sel,{label:'Supplier',value:txSupp,onChange:setTxSupp,options:[{v:'',l:'— Select —'},...suppliers.map(s=>({v:s.name,l:s.name}))]}),
      h(Sel,{label:'Type',value:txType,onChange:setTxType,options:[{v:'credit',l:'Credit (We owe)'},{v:'payment',l:'Payment Made'}]}),
      h(Inp,{label:'Amount ﷼',value:txAmt,onChange:setTxAmt,type:'number'}),
      h(Inp,{label:'Note',value:txNote,onChange:setTxNote}),
      h('label',{style:S.lbl},'Date'),
      h('input',{type:'date',value:txDate,onChange:e=>setTxDate(e.target.value),style:{...S.inp,marginBottom:8}}),
      h('button',{onClick:addTx,style:{...S.btn,background:'#78350f',color:C.orange}},'Save Transaction')
    ),
    suppliers.length===0&&h('div',{style:{...S.card,...S.empty}},'No suppliers'),
    suppliers.map(s=>{
      const txs=supplyTx.filter(t=>t.suppName===s.name);
      const credit=txs.filter(t=>t.type==='credit').reduce((a,t)=>a+t.amount,0);
      const paid=txs.filter(t=>t.type==='payment').reduce((a,t)=>a+t.amount,0);
      const bal=credit-paid;
      return h('div',{key:s.id,style:{...S.card,borderColor:bal>0?C.orange:C.green,cursor:'pointer'},onClick:()=>setView(view===s.name?null:s.name)},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('div',null,
            h('div',{style:{fontWeight:700,fontSize:14}},`${s.name} ${view===s.name?'▲':'▼'}`),
            h('div',{style:{fontSize:12,color:bal>0?C.orange:C.green}},bal>0?`Due: ﷼${fmt(bal)}`:'✅ Clear')
          ),
          h('button',{onClick:e=>{e.stopPropagation();setSuppliers(p=>p.filter(x=>x.name!==s.name))},style:{...S.iconBtn,background:'#7f1d1d',color:'#fff'}},'🗑️')
        ),
        view===s.name&&h('div',{style:{marginTop:8}},
          h(SumRow,{label:'Total Credit',val:`﷼${fmt(credit)}`,color:C.red}),
          h(SumRow,{label:'Total Paid',val:`﷼${fmt(paid)}`,color:C.green}),
          h(SumRow,{label:'Balance',val:`﷼${fmt(bal)}`,color:bal>0?C.orange:C.green}),
          txs.length===0&&h('div',{style:S.empty},'No transactions'),
          [...txs].reverse().map(t=>h('div',{key:t.id,style:{fontSize:12,padding:'4px 0',borderBottom:`1px solid ${C.bg3}`,display:'flex',justifyContent:'space-between'}},
            h('span',{style:{color:C.muted}},`${t.date} ${t.note||t.type}`),
            h('span',{style:{color:t.type==='payment'?C.green:C.orange}},`﷼${fmt(t.amount)}`)
          ))
        )
      );
    })
  );
}

// ── REPORT PAGE ───────────────────────────────────────────────────────────
function ReportPage({sales,approvedSales,stockEntries,customers,supplyTx,suppliers,stockMap,getLastHighCost,
  setStockEntries,setSales,setSuppliers,setSupplyTx,setCustomers,setProductPhotos,setPendingSales,setApprovedSales}){
  const [pass,setPass]=useState('');
  const [unlocked,setUnlocked]=useState(false);
  const [passErr,setPassErr]=useState(false);
  const [month,setMonth]=useState(new Date().toISOString().slice(0,7));
  const [confirm,setConfirm]=useState(false);
  const allSales=[...sales,...approvedSales.filter(a=>!sales.find(s=>s.id===a.id))];
  const mSales=allSales.filter(s=>s.date&&s.date.startsWith(month));
  const totalSalesVal=mSales.reduce((a,s)=>a+Number(s.totalSale||0),0);
  const totalProfit=mSales.reduce((a,s)=>a+Number(s.totalProfit||s.profit||0),0);
  const totalPending=customers.reduce((a,c)=>a+Number(c.pendingAmt||0),0);
  const prodBreak=PRODUCTS.map(p=>{
    const ps=mSales.flatMap(s=>(s.items||[]).filter(i=>i.prodId===p.id));
    const ctns=ps.reduce((a,i)=>a+Number(i.ctns||0),0);
    const val=ps.reduce((a,i)=>a+Number(i.saleTotal||0),0);
    const profit=ps.reduce((a,i)=>a+Number(i.grossProfit||0),0);
    return{...p,ctns,val,profit};
  }).filter(p=>p.ctns>0);
  const suppBal=suppliers.map(s=>{
    const txs=supplyTx.filter(t=>t.suppName===s.name);
    const credit=txs.filter(t=>t.type==='credit').reduce((a,t)=>a+t.amount,0);
    const paid=txs.filter(t=>t.type==='payment').reduce((a,t)=>a+t.amount,0);
    return{...s,bal:credit-paid};
  });
  const shareReport=()=>{
    let msg=`*StockMate Monthly Report*\nMonth: ${month}\n─────────\n`;
    msg+=`Total Sales: ﷼${fmt(totalSalesVal)}\n`;
    prodBreak.forEach(p=>{msg+=`${p.id}: ${p.ctns.toFixed(2)}ctn = ﷼${fmt(p.val)}\n`});
    if(unlocked){
      msg+=`─────────\nProfit: ﷼${fmt(totalProfit)}\nX: ﷼${fmt(totalProfit/2)} | Y: ﷼${fmt(totalProfit/2)}\n`;
    }
    msg+=`Pending: ﷼${fmt(totalPending)}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
  };
  const exportData=()=>{
    const d={stockEntries,sales,approvedSales,suppliers,supplyTx,customers,exported:new Date().toISOString()};
    const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');a.href=u;a.download=`stockmate-${today()}.json`;a.click();
    URL.revokeObjectURL(u);
  };
  return h('div',{style:S.page},
    h('div',{style:S.card},
      h('div',{style:S.cardT},'📊 Monthly Report'),
      h('label',{style:S.lbl},'Select Month'),
      h('input',{type:'month',value:month,onChange:e=>setMonth(e.target.value),style:{...S.inp,marginBottom:0}})
    ),
    h('div',{style:S.card},
      h('div',{style:S.cardT},'Sales Summary'),
      h(SumRow,{label:'Total Sales',val:`﷼${fmt(totalSalesVal)}`,color:C.green}),
      h(SumRow,{label:'Invoices',val:`${mSales.length}`,color:C.blue}),
      h(SumRow,{label:'Customer Pending',val:`﷼${fmt(totalPending)}`,color:C.orange})
    ),
    prodBreak.length>0&&h('div',{style:S.card},
      h('div',{style:S.cardT},'Product Breakdown'),
      prodBreak.map(p=>h('div',{key:p.id,style:S.row},
        h('span',{style:{fontSize:13,fontWeight:600}},`${p.id}`),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{fontSize:12,color:C.green}},`${p.ctns.toFixed(2)} ctn`),
          h('div',{style:{fontSize:11,color:C.muted}},`﷼${fmt(p.val)}`)
        )
      ))
    ),
    !unlocked?h('div',{style:{...S.card,borderColor:'#4c1d95'}},
      h('div',{style:{...S.cardT,color:C.purple}},'🔐 Profit Report (Private)'),
      h(Inp,{label:'Password',value:pass,onChange:setPass,type:'password'}),
      passErr&&h('div',{style:{color:C.red,fontSize:12,marginBottom:6}},'❌ Wrong password'),
      h('button',{onClick:()=>{if(pass==='1989'){setUnlocked(true);setPassErr(false)}else{setPassErr(true);setPass('')}},
        style:{...S.btn,background:'#4c1d95',color:C.purple}},'Unlock')
    ):
    h('div',{style:{...S.card,borderColor:C.purple}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
        h('div',{style:{...S.cardT,color:C.purple,marginBottom:0}},'🔓 Profit Report'),
        h('button',{onClick:()=>setUnlocked(false),style:{...S.iconBtn,background:'#4c1d95',color:'#fff',fontSize:11}},'Lock')
      ),
      h(SumRow,{label:'Gross Profit',val:`﷼${fmt(totalProfit)}`,color:C.purple}),
      h(SumRow,{label:'X 50%',val:`﷼${fmt(totalProfit/2)}`,color:C.cyan}),
      h(SumRow,{label:'Y 50%',val:`﷼${fmt(totalProfit/2)}`,color:C.yellow}),
      h('div',{style:{marginTop:8}},h('button',{onClick:shareReport,style:{...S.btn,background:'#166534',color:C.green}},'📤 Share Report'))
    ),
    unlocked&&suppBal.length>0&&h('div',{style:{...S.card,borderColor:C.orange}},
      h('div',{style:{...S.cardT,color:C.orange}},'🚚 Supplier Balances'),
      suppBal.map(s=>h('div',{key:s.id,style:S.row},
        h('span',{style:{fontSize:13,fontWeight:600}},s.name),
        h('span',{style:{color:s.bal>0?C.orange:C.green,fontWeight:700}},`﷼${fmt(Math.abs(s.bal))} ${s.bal>0?'owed':'clear'}`)
      ))
    ),
    h('div',{style:S.card},
      h('div',{style:S.cardT},'💾 Backup & Reset'),
      h('button',{onClick:exportData,style:{...S.btn,background:'#1e3a5f',color:C.blue}},'📤 Export Backup'),
      !confirm?h('button',{onClick:()=>setConfirm(true),style:{...S.btn,background:'#7f1d1d',color:'#fca5a5',marginTop:8}},'⚠️ Reset All Data'):
      h('div',{style:{marginTop:8}},
        h('div',{style:{color:C.red,fontSize:12,marginBottom:8}},'Are you sure? Cannot be undone.'),
        h('div',{style:{display:'flex',gap:8}},
          h('button',{onClick:()=>{
            setStockEntries([]);setSales([]);setSuppliers([]);setSupplyTx([]);
            setCustomers([]);setProductPhotos({});setPendingSales([]);setApprovedSales([]);
            setConfirm(false);
          },style:{...S.btnSm,background:'#dc2626',color:'#fff'}},'Yes Reset'),
          h('button',{onClick:()=>setConfirm(false),style:{...S.btnSm,background:C.muted3,color:'#fff'}},'Cancel')
        )
      )
    )
  );
}

// ══ ROOT APP ══════════════════════════════════════════════════════════════
function App(){
  const [user,setUser]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [stockEntries,setStockEntries]=useState(()=>lsGet('sm_stock3')||[]);
  const [sales,setSales]=useState(()=>lsGet('sm_sales3')||[]);
  const [pendingSales,setPendingSales]=useState(()=>lsGet('sm_pending')||[]);
  const [approvedSales,setApprovedSales]=useState(()=>lsGet('sm_approved')||[]);
  const [suppliers,setSuppliers]=useState(()=>lsGet('sm_supp3')||[]);
  const [supplyTx,setSupplyTx]=useState(()=>lsGet('sm_stx3')||[]);
  const [customers,setCustomers]=useState(()=>lsGet('sm_cust3')||[]);
  const [productPhotos,setProductPhotos]=useState(()=>lsGet('sm_photos3')||{});

  useEffect(()=>{
    Promise.all([
      dbGet('sm_stock3'),dbGet('sm_sales3'),dbGet('sm_pending'),dbGet('sm_approved'),
      dbGet('sm_supp3'),dbGet('sm_stx3'),dbGet('sm_cust3'),dbGet('sm_photos3')
    ]).then(([st,sa,pe,ap,su,tx,cu,ph])=>{
      if(st)setStockEntries(st);if(sa)setSales(sa);if(pe)setPendingSales(pe);
      if(ap)setApprovedSales(ap);if(su)setSuppliers(su);if(tx)setSupplyTx(tx);
      if(cu)setCustomers(cu);if(ph)setProductPhotos(ph);
      setLoaded(true);
    }).catch(()=>setLoaded(true));
  },[]);

  useEffect(()=>{if(loaded){lsSet('sm_stock3',stockEntries);dbSet('sm_stock3',stockEntries)}},[stockEntries,loaded]);
  useEffect(()=>{if(loaded){lsSet('sm_sales3',sales);dbSet('sm_sales3',sales)}},[sales,loaded]);
  useEffect(()=>{if(loaded){lsSet('sm_pending',pendingSales);dbSet('sm_pending',pendingSales)}},[pendingSales,loaded]);
  useEffect(()=>{if(loaded){lsSet('sm_approved',approvedSales);dbSet('sm_approved',approvedSales)}},[approvedSales,loaded]);
  useEffect(()=>{if(loaded){lsSet('sm_supp3',suppliers);dbSet('sm_supp3',suppliers)}},[suppliers,loaded]);
  useEffect(()=>{if(loaded){lsSet('sm_stx3',supplyTx);dbSet('sm_stx3',supplyTx)}},[supplyTx,loaded]);
  useEffect(()=>{if(loaded){lsSet('sm_cust3',customers);dbSet('sm_cust3',customers)}},[customers,loaded]);
  useEffect(()=>{if(loaded){lsSet('sm_photos3',productPhotos);dbSet('sm_photos3',productPhotos)}},[productPhotos,loaded]);

  function getStockMap(){
    const m={};
    PRODUCTS.forEach(p=>{m[p.id]={totalPcs:0,layers:[],photo:productPhotos[p.id]||''}});
    stockEntries.forEach(e=>{
      if(!m[e.prodId])return;
      const pcs=Number(e.pcs)||toPcs(e.qty,e.unit,e.prodId);
      const cpp=Number(e.costPerCarton)/PROD_MAP[e.prodId].cartonPcs;
      m[e.prodId].totalPcs+=pcs;
      m[e.prodId].layers.push({pcs,cpp,costPerCarton:Number(e.costPerCarton),date:e.date});
    });
    [...sales,...approvedSales].forEach(s=>{
      (s.items||[]).forEach(i=>{
        if(!m[i.prodId])return;
        m[i.prodId].totalPcs-=Number(i.pcs||0);
      });
    });
    return m;
  }

  function getLastHighCost(prodId){
    const entries=stockEntries.filter(e=>e.prodId===prodId);
    if(!entries.length)return 0;
    return Math.max(...entries.map(e=>Number(e.costPerCarton)));
  }

  const stockMap=getStockMap();

  if(!user)return h(LoginScreen,{onLogin:setUser});
  if(user.role==='subeesh')return h(ZView,{stockMap,productPhotos,onLogout:()=>setUser(null)});
  if(user.role==='natru')return h(YView,{stockMap,productPhotos,pendingSales,setPendingSales,
    approvedSales,onLogout:()=>setUser(null)});

  return h(XApp,{onLogout:()=>setUser(null),pendingSales,setPendingSales,
    approvedSales,setApprovedSales,stockEntries,setStockEntries,sales,setSales,
    suppliers,setSuppliers,supplyTx,setSupplyTx,customers,setCustomers,
    productPhotos,setProductPhotos,stockMap,getLastHighCost});
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
