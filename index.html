// ── Storage: IndexedDB with localStorage fallback ────────────────────────────
// On iOS Home Screen, localStorage can be cleared by the OS.
// We use IndexedDB (more persistent) with localStorage as fallback.
const DB_NAME='stockmate_db', DB_VER=1, DB_STORE='kv';
let dbReady=null;
function openDB(){
  if(dbReady)return dbReady;
  dbReady=new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(DB_STORE);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=()=>rej(req.error);
  });
  return dbReady;
}
async function idbGet(k){
  try{
    const db=await openDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction(DB_STORE,'readonly');
      const req=tx.objectStore(DB_STORE).get(k);
      req.onsuccess=()=>res(req.result??null);
      req.onerror=()=>rej(req.error);
    });
  }catch{
    try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}
  }
}
async function idbSet(k,v){
  try{
    const db=await openDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction(DB_STORE,'readwrite');
      tx.objectStore(DB_STORE).put(v,k);
      tx.oncomplete=()=>res();
      tx.onerror=()=>rej(tx.error);
    });
  }catch{
    try{localStorage.setItem(k,JSON.stringify(v))}catch{}
  }
}

// Sync wrappers used at startup (fallback to localStorage for initial load)
const loadSync=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}};
const saveSync=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

// ══ DASHBOARD ════════════════════════════════════════════════════════════════
function Dashboard({stock,removals,debts}){
  const stockMap={};
  stock.forEach(e=>{
    if(!stockMap[e.name])stockMap[e.name]={name:e.name,totalPcs:0};
    stockMap[e.name].totalPcs+=Number(e.pcs);
  });
  const remMap={};
  removals.forEach(e=>{
    if(!remMap[e.name])remMap[e.name]=0;
    remMap[e.name]+=Number(e.pcs);
  });
  const totalIn=stock.reduce((a,e)=>a+Number(e.pcs)*Number(e.price),0);
  const totalOut=removals.reduce((a,e)=>a+Number(e.pcs)*Number(e.price),0);
  const openDebts=debts.filter(d=>!d.paid);
  const totalDebt=openDebts.reduce((a,d)=>a+d.items.reduce((b,i)=>b+Number(i.qty)*Number(i.price),0),0);
  const varieties=Object.keys(stockMap).length;

  return React.createElement("div",{style:S.page},
    React.createElement("div",{style:S.grid2},
      React.createElement(KpiCard,{label:"Total Stock Value",value:`﷼${fmt(totalIn)}`,color:"#4ade80",icon:"💰"}),
      React.createElement(KpiCard,{label:"Total Removed",value:`﷼${fmt(totalOut)}`,color:"#f87171",icon:"📤"}),
      React.createElement(KpiCard,{label:"Open Debts",value:`﷼${fmt(totalDebt)}`,color:"#fb923c",icon:"💳"}),
      React.createElement(KpiCard,{label:"Varieties",value:varieties,color:"#818cf8",icon:"🗂️"})
    ),
    React.createElement("div",{style:S.card},
      React.createElement("div",{style:S.cardTitle},"📦 Current Stock Overview"),
      Object.keys(stockMap).length===0&&React.createElement("div",{style:S.empty},"No stock added yet"),
      Object.values(stockMap).map(item=>{
        const cur=item.totalPcs-(remMap[item.name]||0);
        return React.createElement("div",{key:item.name,style:S.row},
          React.createElement("span",{style:{fontWeight:600,fontSize:14}},item.name),
          React.createElement("span",{style:{...S.badge,background:cur<0?"#dc2626":"#166534"}},`${cur} pcs`)
        );
      })
    ),
    openDebts.length>0&&React.createElement("div",{style:S.card},
      React.createElement("div",{style:S.cardTitle},"💳 Outstanding Debts"),
      openDebts.map(d=>{
        const total=d.items.reduce((a,i)=>a+Number(i.qty)*Number(i.price),0);
        return React.createElement("div",{key:d.id,style:S.row},
          React.createElement("div",null,
            React.createElement("div",{style:{fontWeight:600,fontSize:14}},d.debtor),
            React.createElement("div",{style:{fontSize:11,color:"#6b7280"}},`Due: ${d.dueDate||"—"}`)
          ),
          React.createElement("span",{style:{...S.badge,background:"#92400e"}},`﷼${fmt(total)}`)
        );
      })
    )
  );
}

// ══ REMOVE PAGE ══════════════════════════════════════════════════════════════
function RemovePage({stock,removals,setRemovals}){
  const [form,setForm]=useState({name:"",pcs:"",price:"",unit:"pcs"});
  const [editId,setEditId]=useState(null);
  const [editData,setEditData]=useState({});
  const stockNames=[...new Set(stock.map(e=>e.name))];
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const remove=()=>{
    if(!form.name||!form.pcs||!form.price)return alert("Please fill all fields");
    setRemovals(p=>[...p,{id:uid(),...form,date:today()}]);
    setForm({name:"",pcs:"",price:"",unit:"pcs"});
  };
  const variance=removals.map(r=>{
    const rel=stock.filter(s=>s.name===r.name);
    const tq=rel.reduce((a,s)=>a+Number(s.pcs),0);
    const tv=rel.reduce((a,s)=>a+Number(s.pcs)*Number(s.price),0);
    const avg=tq>0?tv/tq:0;
    return{...r,variance:Number(r.pcs)*Number(r.price)-Number(r.pcs)*avg};
  });
  return React.createElement("div",{style:S.page},
    React.createElement("div",{style:S.card},
      React.createElement("div",{style:S.cardTitle},"📤 Remove from Stock"),
      React.createElement("div",{style:{marginBottom:8}},
        React.createElement("label",{style:S.label},"Item Name"),
        React.createElement("select",{value:form.name,onChange:e=>upd("name",e.target.value),style:S.select},
          React.createElement("option",{value:""},"— Select item —"),
          stockNames.map(n=>React.createElement("option",{key:n,value:n},n))
        )
      ),
      React.createElement("div",{style:S.row2},
        React.createElement("div",{style:{flex:1}},React.createElement(Inp,{label:"Qty Removed",value:form.pcs,onChange:v=>upd("pcs",v),type:"number"})),
        React.createElement("div",{style:{flex:1}},
          React.createElement("label",{style:S.label},"Unit"),
          React.createElement("select",{value:form.unit,onChange:e=>upd("unit",e.target.value),style:S.select},
            ["pcs","carton","kg","box","litre"].map(u=>React.createElement("option",{key:u,value:u},u))
          )
        )
      ),
      React.createElement(Inp,{label:"Removal Price ﷼",value:form.price,onChange:v=>upd("price",v),type:"number"}),
      React.createElement("button",{onClick:remove,style:S.btnRed},"− Remove from Stock")
    ),
    React.createElement("div",{style:S.card},
      React.createElement("div",{style:S.cardTitle},`📋 Removal History (${removals.length})`),
      removals.length===0&&React.createElement("div",{style:S.empty},"No removals yet"),
      [...variance].reverse().map(r=>editId===r.id?
        React.createElement("div",{key:r.id,style:{...S.entryCard,borderColor:"#f87171"}},
          React.createElement(Inp,{label:"Name",value:editData.name,onChange:v=>setEditData(d=>({...d,name:v}))}),
          React.createElement("div",{style:S.row2},
            React.createElement(Inp,{label:"Qty",value:editData.pcs,onChange:v=>setEditData(d=>({...d,pcs:v})),type:"number"}),
            React.createElement(Inp,{label:"Price ﷼",value:editData.price,onChange:v=>setEditData(d=>({...d,price:v})),type:"number"})
          ),
          React.createElement("div",{style:S.row2},
            React.createElement("button",{onClick:()=>{setRemovals(p=>p.map(x=>x.id===editId?{...x,...editData}:x));setEditId(null);},style:{...S.btnSmall,background:"#166534"}},"Save"),
            React.createElement("button",{onClick:()=>setEditId(null),style:{...S.btnSmall,background:"#374151"}},"Cancel")
          )
        ):
        React.createElement("div",{key:r.id,style:S.entryCard},
          React.createElement("div",{style:{display:"flex",justifyContent:"space-between"}},
            React.createElement("div",{style:{flex:1}},
              React.createElement("div",{style:{fontWeight:600,fontSize:14}},r.name),
              React.createElement("div",{style:{fontSize:12,color:"#6b7280"}},`${r.pcs} ${r.unit} × ﷼${r.price} = `,React.createElement("span",{style:{color:"#f87171"}},`﷼${fmt(r.pcs*r.price)}`)),
              React.createElement("div",{style:{fontSize:11,color:"#4b5563"}},`📅 ${r.date}`),

            ),
            React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6}},
              React.createElement("button",{onClick:()=>{setEditId(r.id);setEditData({...r});},style:{...S.iconBtn,background:"#1e40af"}},"✏️"),

            )

// ══ DEBT PAGE ════════════════════════════════════════════════════════════════

  const stockNames=[...new Set(stock.map(e=>e.name))];
  const addItem=()=>setItems(p=>[...p,{id:uid(),name:"",qty:"",price:""}]);
  const updItem=(id,f,v)=>setItems(p=>p.map(i=>i.id===id?{...i,[f]:v}:i));
  const saveDebt=()=>{

    setDebtor("");setDate(today());setDueDate("");setItems([{id:uid(),name:"",qty:"",price:""}]);setShowForm(false);
  };
  const openDebts=debts.filter(d=>!d.paid);
  const paidDebts=debts.filter(d=>d.paid);
  const openTotal=openDebts.reduce((a,d)=>a+d.items.reduce((b,i)=>b+Number(i.qty)*Number(i.price),0),0);
  return React.createElement("div",{style:S.page},
    React.createElement("div",{style:{...S.card,background:"#1c1917",borderColor:"#fb923c"}},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        React.createElement("div",null,
          React.createElement("div",{style:S.cardTitle},"💳 Open Debts"),
          React.createElement("div",{style:{color:"#fb923c",fontSize:22,fontWeight:700}},`﷼${fmt(openTotal)}`)
        ),
        React.createElement("div",{style:{...S.badge,background:"#78350f"}},`${openDebts.length} debtors`)
      )
    ),
    React.createElement("button",{onClick:()=>setShowForm(s=>!s),style:S.btnOrange},showForm?"✕ Cancel":"+ New Debt Entry"),
    showForm&&React.createElement("div",{style:S.card},
      React.createElement("div",{style:S.cardTitle},"New Debt Record"),
      React.createElement(Inp,{label:"Debtor Name",value:debtor,onChange:setDebtor,placeholder:"e.g. Ahmed"}),
      React.createElement("div",{style:S.row2},
        React.createElement("div",{style:{flex:1}},React.createElement("label",{style:S.label},"Date"),React.createElement("input",{type:"date",value:date,onChange:e=>setDate(e.target.value),style:S.input})),
        React.createElement("div",{style:{flex:1}},React.createElement("label",{style:S.label},"Due Date"),React.createElement("input",{type:"date",value:dueDate,onChange:e=>setDueDate(e.target.value),style:S.input}))
      ),
      React.createElement("label",{style:{...S.label,marginBottom:8}},"Items Taken"),
      items.map(item=>React.createElement("div",{key:item.id,style:{...S.entryCard,marginBottom:6}},
        React.createElement("div",{style:{marginBottom:8}},
          React.createElement("label",{style:S.label},"Item"),
          React.createElement("select",{value:item.name,onChange:e=>updItem(item.id,"name",e.target.value),style:S.select},
            React.createElement("option",{value:""},"— Select —"),
            stockNames.map(n=>React.createElement("option",{key:n,value:n},n))
          )
        ),
        React.createElement("div",{style:S.row2},
          React.createElement(Inp,{label:"Qty",value:item.qty,onChange:v=>updItem(item.id,"qty",v),type:"number"}),
          React.createElement(Inp,{label:"Price ﷼",value:item.price,onChange:v=>updItem(item.id,"price",v),type:"number"})
        ),
        React.createElement("div",{style:{color:"#4ade80",fontSize:12,marginBottom:4}},`Total: ﷼${fmt(item.qty*item.price)}`),
        items.length>1&&React.createElement("button",{onClick:()=>setItems(p=>p.filter(i=>i.id!==item.id)),style:{...S.btnSmall,background:"#7f1d1d",marginTop:4,width:"100%"}},"Remove item")
      )),
      React.createElement("button",{onClick:addItem,style:{...S.btnSmall,background:"#1e3a5f",marginBottom:8,width:"100%"}},"+ Add another item"),
      React.createElement("button",{onClick:saveDebt,style:S.btnOrange},"💾 Save Debt")
    ),
    openDebts.map(d=>{
      const total=d.items.reduce((a,i)=>a+Number(i.qty)*Number(i.price),0);
      const exp=expandId===d.id;
      return React.createElement("div",{key:d.id,style:{...S.entryCard,borderColor:"#fb923c"}},
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
          React.createElement("div",{onClick:()=>setExpandId(exp?null:d.id),style:{flex:1,cursor:"pointer",paddingRight:8}},
            React.createElement("div",{style:{fontWeight:600,fontSize:14}},`${d.debtor} ${exp?"▲":"▼"}`),
            React.createElement("div",{style:{fontSize:11,color:"#6b7280"}},`📅 ${d.date} | Due: ${d.dueDate||"—"}`),
            React.createElement("div",{style:{color:"#fb923c",fontWeight:700}},`﷼${fmt(total)}`)
          ),
          React.createElement("div",{style:{display:"flex",gap:6}},
            React.createElement("button",{onClick:()=>setDebts(p=>p.map(x=>x.id===d.id?{...x,paid:true}:x)),style:{...S.iconBtn,background:"#166534"}},"✓"),
            React.createElement("button",{onClick:()=>setDebts(p=>p.filter(x=>x.id!==d.id)),style:{...S.iconBtn,background:"#7f1d1d"}},"🗑️")
          )

            `${i.name} — ${i.qty} pcs × ﷼${i.price} = `,React.createElement("span",{style:{color:"#fb923c"}},`﷼${fmt(i.qty*i.price)}`)
          ))

      );
    }),
    paidDebts.length>0&&React.createElement("div",{style:S.card},
      React.createElement("div",{style:{...S.cardTitle,color:"#6b7280"}},`✓ Cleared Debts (${paidDebts.length})`),
      paidDebts.map(d=>{
        const total=d.items.reduce((a,i)=>a+Number(i.qty)*Number(i.price),0);
        return React.createElement("div",{key:d.id,style:{...S.row,opacity:0.5}},
          React.createElement("div",null,
            React.createElement("div",{style:{fontWeight:600,fontSize:14}},d.debtor),
            React.createElement("div",{style:{fontSize:11,color:"#6b7280"}},d.date)
          ),

            React.createElement("span",{style:{color:"#4ade80"}},`﷼${fmt(total)}`),
            React.createElement("button",{onClick:()=>setDebts(p=>p.filter(x=>x.id!==d.id)),style:{...S.iconBtn,background:"#374151"}},"🗑️")
          )

      })
    )
  );
}

// ══ SUMMARY PAGE ═════════════════════════════════════════════════════════════
function SummaryPage({stock,removals,debts,setStock,setRemovals,setDebts}){
  const [confirm,setConfirm]=useState(false);
  const [backupMsg,setBackupMsg]=useState("");
  const names=[...new Set([...stock.map(e=>e.name),...removals.map(e=>e.name)])];
  const stats=names.map(name=>{
    const entries=stock.filter(s=>s.name===name);
    const rems=removals.filter(r=>r.name===name);
    const tIn=entries.reduce((a,e)=>a+Number(e.pcs),0);
    const tInV=entries.reduce((a,e)=>a+Number(e.pcs)*Number(e.price),0);
    const tOut=rems.reduce((a,r)=>a+Number(r.pcs),0);
    const tOutV=rems.reduce((a,r)=>a+Number(r.pcs)*Number(r.price),0);
    const prices=[...new Map(entries.map(e=>[e.price,e])).values()].map(e=>e.price);
    return{name,tIn,tInV,tOut,tOutV,current:tIn-tOut,prices,entries,rems};
  });
  const gIn=stats.reduce((a,i)=>a+i.tInV,0);
  const gOut=stats.reduce((a,i)=>a+i.tOutV,0);
  const debtTotal=debts.filter(d=>!d.paid).reduce((a,d)=>a+d.items.reduce((b,i)=>b+Number(i.qty)*Number(i.price),0),0);

  // Export backup as JSON file
  const exportData=()=>{
    const data={stock,removals,debts,exported:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`stockmate-backup-${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setBackupMsg("✅ Backup saved! Store it safely.");
    setTimeout(()=>setBackupMsg(""),3000);
  };

  // Import backup from JSON file
  const importData=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.stock&&data.removals&&data.debts){
          setStock(data.stock);
          setRemovals(data.removals);
          setDebts(data.debts);
          setBackupMsg("✅ Data restored successfully!");
        }else{
          setBackupMsg("❌ Invalid backup file.");
        }
      }catch{setBackupMsg("❌ Could not read file.");}
      setTimeout(()=>setBackupMsg(""),3000);
    };
    reader.readAsText(file);
    e.target.value="";
  };

  return React.createElement("div",{style:S.page},
    React.createElement("div",{style:S.card},
      React.createElement("div",{style:S.cardTitle},"📊 Full Summary"),
      React.createElement(SumRow,{label:"Total Stock Entered",val:`﷼${fmt(gIn)}`,color:"#4ade80"}),
      React.createElement(SumRow,{label:"Total Removed Value",val:`﷼${fmt(gOut)}`,color:"#f87171"}),
      React.createElement(SumRow,{label:"Net Balance",val:`﷼${fmt(gIn-gOut)}`,color:"#818cf8"}),
      React.createElement(SumRow,{label:"Open Debts",val:`﷼${fmt(debtTotal)}`,color:"#fb923c"}),
      React.createElement(SumRow,{label:"Varieties",val:`${names.length} items`,color:"#67e8f9"})
    ),
    stats.map(item=>React.createElement("div",{key:item.name,style:S.card},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
        React.createElement("div",{style:S.cardTitle},item.name),
        React.createElement("span",{style:{...S.badge,background:item.current<0?"#dc2626":"#166534"}},`${item.current} left`)
      ),
      React.createElement(SumRow,{label:"In",val:`${item.tIn} pcs / ﷼${fmt(item.tInV)}`,color:"#4ade80"}),
      React.createElement(SumRow,{label:"Out",val:`${item.tOut} pcs / ﷼${fmt(item.tOutV)}`,color:"#f87171"}),
      item.prices.length>1&&React.createElement("div",{style:{fontSize:11,color:"#fbbf24",marginTop:4}},`⚠️ Multiple prices: ${item.prices.map(p=>`﷼${p}`).join(", ")}`),
      item.rems.length>0&&React.createElement("div",{style:{marginTop:6}},
        React.createElement("div",{style:{fontSize:11,color:"#9ca3af",marginBottom:4}},"Removal variance:"),
        item.rems.map((r,i)=>{
          const avg=item.tInV/(item.tIn||1);
          const v=Number(r.pcs)*Number(r.price)-Number(r.pcs)*avg;
          return React.createElement("div",{key:i,style:{fontSize:11,color:"#9ca3af",padding:"3px 0",borderBottom:"1px solid #111827"}},
            `${r.date}: ${r.pcs} ${r.unit} @ ﷼${r.price} → `,React.createElement("span",{style:{color:v>=0?"#4ade80":"#f87171"}},`${v>=0?"▲":"▼"} ﷼${fmt(Math.abs(v))}`)
          );
        })
      )
    )),
    // Backup / Restore card
    React.createElement("div",{style:{...S.card,borderColor:"#1d4ed8"}},
      React.createElement("div",{style:S.cardTitle},"💾 Backup & Restore"),
      React.createElement("div",{style:{fontSize:12,color:"#6b7280",marginBottom:10,lineHeight:1.5}},
        "Export your data as a JSON file to keep it safe. Import it anytime to restore."
      ),
      backupMsg&&React.createElement("div",{style:{fontSize:13,color:backupMsg.startsWith("✅")?"#4ade80":"#f87171",marginBottom:8,fontWeight:600}},backupMsg),
      React.createElement("button",{onClick:exportData,style:{...S.btnBlue,marginBottom:8}},"📤 Export Backup"),
      React.createElement("label",{style:{...S.btnSmall,background:"#1e3a5f",display:"block",width:"100%",textAlign:"center",padding:"14px 12px",borderRadius:12,cursor:"pointer",fontSize:16,color:"#93c5fd",fontWeight:700}},
        "📥 Import Backup",
        React.createElement("input",{type:"file",accept:".json",onChange:importData,style:{display:"none"}})
      )
    ),
    // Reset card
    React.createElement("div",{style:S.card},
      React.createElement("div",{style:S.cardTitle},"⚠️ Reset All Data"),
      !confirm?React.createElement("button",{onClick:()=>setConfirm(true),style:{...S.btnSmall,background:"#7f1d1d",width:"100%",padding:14,fontSize:15}},"Reset Everything"):
      React.createElement("div",null,
        React.createElement("div",{style:{color:"#f87171",marginBottom:8,fontSize:13}},"Are you sure? This cannot be undone."),
        React.createElement("div",{style:S.row2},
          React.createElement("button",{onClick:()=>{setStock([]);setRemovals([]);setDebts([]);setConfirm(false);},style:{...S.btnSmall,background:"#dc2626"}},"Yes, Reset"),
          React.createElement("button",{onClick:()=>setConfirm(false),style:{...S.btnSmall,background:"#374151"}},"Cancel")
        )
      )
    )
  );
}

// ══ APP ROOT ══════════════════════════════════════════════════════════════════
function App(){
  const [tab,setTab]=useState("Dashboard");
  const [stock,setStock]=useState(()=>loadSync("sm_stock")||[]);
  const [removals,setRemovals]=useState(()=>loadSync("sm_removals")||[]);
  const [debts,setDebts]=useState(()=>loadSync("sm_debts")||[]);
  const [loaded,setLoaded]=useState(false);

  // Load from IndexedDB on mount (more persistent than localStorage on iOS)
  useEffect(()=>{
    Promise.all([idbGet("sm_stock"),idbGet("sm_removals"),idbGet("sm_debts")]).then(([s,r,d])=>{
      if(s)setStock(s);
      if(r)setRemovals(r);
      if(d)setDebts(d);
      setLoaded(true);
    }).catch(()=>setLoaded(true));
  },[]);

  // Save to both storages on change
  useEffect(()=>{if(loaded){saveSync("sm_stock",stock);idbSet("sm_stock",stock);}},[stock,loaded]);
  useEffect(()=>{if(loaded){saveSync("sm_removals",removals);idbSet("sm_removals",removals);}},[removals,loaded]);
  useEffect(()=>{if(loaded){saveSync("sm_debts",debts);idbSet("sm_debts",debts);}},[debts,loaded]);

  return React.createElement("div",{id:"app-shell",style:{background:"#0a0a0f",height:"100%",height:"100dvh",color:"#f1f5f9",display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto",overflow:"hidden"}},
    // Header
    React.createElement("div",{style:S.header},
      React.createElement("span",{style:S.logo},"📦 StockMate"),
      React.createElement("span",{style:{fontSize:11,color:"#64748b"}},"Inventory Manager")
    ),
    // Content scroll area
    React.createElement("div",{style:{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",overscrollBehavior:"contain"}},
      tab==="Dashboard"&&React.createElement(Dashboard,{stock,removals,debts}),
      tab==="Stock"&&React.createElement(StockPage,{stock,setStock}),
      tab==="Remove"&&React.createElement(RemovePage,{stock,removals,setRemovals}),
      tab==="Debt"&&React.createElement(DebtPage,{debts,setDebts,stock,setRemovals}),
      tab==="Summary"&&React.createElement(SummaryPage,{stock,removals,debts,setStock,setRemovals,setDebts})
    ),
    // Nav bar
    React.createElement("nav",{style:S.nav},
      TABS.map(t=>React.createElement("button",{key:t,onClick:()=>setTab(t),style:{...S.navBtn,color:tab===t?"#60a5fa":"#4b5563"}},
        React.createElement("span",{style:{fontSize:20}},TAB_ICON[t]),
        React.createElement("span",{style:{fontSize:9,fontWeight:600,letterSpacing:"0.5px"}},t)
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
